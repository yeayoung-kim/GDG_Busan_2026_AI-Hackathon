<!DOCTYPE html>

        ::-webkit-scrollbar {
            display: none;

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-container-padding antialiased">
<!-- Header / Brand Section -->
<header class="flex flex-col items-center text-center mb-16 space-y-4">
<h1 class="font-display-lg text-display-lg text-primary-container tracking-widest uppercase">
            ALIGN.AI
        </h1>
<p class="font-label-caps text-label-caps text-secondary uppercase">
            PANGYO VIBE OPTIMIZATION PROTOCOL
        </p>
</header>
<!-- Main Canvas Area -->
<main class="w-full max-w-3xl flex flex-col items-center space-y-12">
<!-- Video Preview Container (Raw Rectangle, Inactive Placeholder) -->
<div class="w-full aspect-video bg-surface-container border border-outline-variant flex flex-col items-center justify-center relative rounded-none shadow-none">
<span class="material-symbols-outlined text-outline-variant text-6xl mb-4" style="font-variation-settings: 'FILL' 0;">
                videocam_off
            </span>
<span class="font-label-caps text-label-caps text-outline-variant uppercase tracking-widest">
                Camera Inactive
            </span>
</div>
<!-- Action / Input Area -->
<div class="flex flex-col items-center space-y-8 w-full max-w-sm">
<div class="text-center space-y-6 w-full">
<label class="block font-body-sm text-body-sm text-on-surface-variant" for="room-code">
                    Enter room code to align.
                </label>
<!-- Centrally aligned minimal input -->
<input autocomplete="off" class="w-full bg-transparent border-0 border-b border-primary text-center font-headline-md text-headline-md text-primary placeholder-surface-variant focus:ring-0 focus:border-primary-container focus:placeholder-transparent transition-colors py-2 rounded-none" id="room-code" placeholder="ROOM CODE" spellcheck="false" type="text"/>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps py-4 px-8 uppercase tracking-widest hover:bg-surface-tint transition-colors rounded-none shadow-none flex justify-center items-center gap-2 group">
                Join Room
                <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 1;">
                    arrow_forward
                </span>
</button>
</div>
